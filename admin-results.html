<!-- admin-results.html -->
<div class="p-8 bg-white rounded-2xl shadow-xl border-t-4 border-blue-900">
    <h2 class="text-2xl font-bold mb-6 text-blue-900">إدارة نتائج الطلاب - الملك الكامل</h2>
    
    <div class="grid md:grid-cols-2 gap-6 mb-8">
        <div class="border-2 border-dashed border-gray-300 p-6 rounded-lg text-center">
            <p class="mb-4 text-gray-600">رفع ملف نتائج (Excel / CSV)</p>
            <input type="file" id="excelFile" class="hidden">
            <button onclick="document.getElementById('excelFile').click()" class="bg-blue-900 text-white px-6 py-2 rounded-lg hover:bg-blue-800">اختر الملف</button>
        </div>
        
        <div class="space-y-4">
            <input type="text" id="sSeatNumber" placeholder="رقم الجلوس" class="w-full border p-2 rounded">
            <input type="number" id="sGrade" placeholder="الدرجة" class="w-full border p-2 rounded">
            <button id="saveResultBtn" class="w-full bg-green-600 text-white p-2 rounded font-bold">حفظ النتيجة يدوياً</button>
        </div>
    </div>
</div>

<script type="module">
    import { db, doc, setDoc } from './config.js';
    
    document.getElementById('saveResultBtn').onclick = async () => {
        const seat = document.getElementById('sSeatNumber').value;
        const score = document.getElementById('sGrade').value;
        
        await setDoc(doc(db, "results", seat), {
            math: score, // مثال لمادة الرياضيات
            physics: 95, // بيانات تجريبية
            chemistry: 88,
            timestamp: new Date()
        });
        alert("تم حفظ نتيجة الطالب رقم " + seat);
    };
</script>
