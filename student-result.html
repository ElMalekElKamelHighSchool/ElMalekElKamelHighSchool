<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة النتائج الرسمية | مدرسة الملك الكامل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #0f172a; }
        .result-card { background: linear-gradient(to bottom, #ffffff, #f8fafc); }
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; padding: 0 !important; }
            .result-card { border: none !important; box-shadow: none !important; width: 100% !important; margin: 0 !important; }
        }
        .shimmer {
            background: linear-gradient(90deg, #facc15 25%, #fef08a 50%, #facc15 75%);
            background-size: 200% 100%;
            animation: shimmer 2s infinite linear;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        @keyframes shimmer { to { background-position: -200% 0; } }
    </style>
</head>
<body class="p-4 md:p-10 flex flex-col items-center">

    <div class="max-w-xl w-full text-center no-print">
        <div class="mb-10">
            <h1 class="text-4xl font-black mb-2 shimmer">بوابة النتائج الرسمية</h1>
            <p class="text-blue-300 font-bold">مدرسة الملك الكامل الثانوية بنين</p>
        </div>
        
        <div id="searchArea" class="bg-slate-800 p-8 rounded-[40px] shadow-2xl border-2 border-slate-700 mb-10">
            <div class="relative mb-4">
                <i class="fas fa-key absolute right-4 top-5 text-yellow-500"></i>
                <input id="secretInput" type="text" placeholder="أدخل كود الاستعلام السري" 
                       class="w-full p-4 pr-12 rounded-2xl text-black text-center font-black text-xl outline-none focus:ring-4 ring-yellow-500/50 transition">
            </div>
            <button onclick="getFinalResult()" class="w-full bg-yellow-500 text-blue-900 p-5 rounded-2xl font-black text-lg hover:bg-white hover:scale-105 active:scale-95 transition shadow-lg">
                <i class="fas fa-search ml-2"></i> استعلام عن النتيجة
            </button>
            <p class="text-[10px] text-slate-400 mt-4 italic uppercase">Powered by Engineering State Systems</p>
        </div>
    </div>

    <div id="resultDisplay" class="hidden w-full max-w-2xl result-card text-slate-900 p-8 rounded-[50px] shadow-[0_35px_60px_-15px_rgba(0,0,0,0.5)] border-t-8 border-yellow-500 relative">
        <div id="resultContent">
            </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCSwNiOHDC0m6zoBx_BeAGyaE33Zmhuvi4",
            authDomain: "hazoma-60ed2.firebaseapp.com",
            projectId: "hazoma-60ed2",
            storageBucket: "hazoma-60ed2.firebasestorage.app",
            messagingSenderId: "962438384604",
            appId: "1:962438384604:web:52db16e5723a8f6d3bdd19"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 1. معالجة الرابط التلقائي
        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            const g = params.get('g');
            if(id) {
                document.getElementById('secretInput').value = id;
                getFinalResult(id, g);
            }
        };

        async function getFinalResult(manualID, manualGrade) {
            const id = manualID || document.getElementById('secretInput').value.trim();
            if(!id) return alert("من فضلك أدخل كود الاستعلام أولاً");

            let studentData = null;
            let targetGrade = manualGrade;

            // إذا كان الصف غير معروف (إدخال يدوي)، نبحث في كل الصفوف
            if (!targetGrade) {
                const grades = ['1sec', '2sec', '3sec'];
                for (let g of grades) {
                    const check = await db.collection(`results_${g}`).doc(id).get();
                    if (check.exists) {
                        studentData = check.data();
                        break;
                    }
                }
            } else {
                const res = await db.collection(`results_${targetGrade}`).doc(id).get();
                if (res.exists) studentData = res.data();
            }

            if(!studentData) return alert("عذراً.. الكود غير صحيح أو لم يتم رفع نتيجتك بعد!");

            // تأثير النجاح
            confetti({ particleCount: 200, spread: 80, origin: { y: 0.6 }, colors: ['#facc15', '#1e3a8a', '#ffffff'] });
            
            const display = document.getElementById('resultDisplay');
            const content = document.getElementById('resultContent');
            display.classList.remove('hidden');
            
            // خريطة أسماء الصفوف
            const gNames = {'1sec': 'الأول الثانوي', '2sec': 'الثاني الثانوي', '3sec': 'الثالث الثانوي'};

            let tableHTML = `
                <div class="text-center mb-6">
                    <img src="https://cdn-icons-png.flaticon.com/512/190/190411.png" class="w-20 mx-auto mb-4">
                    <h2 class="text-3xl font-black text-blue-900">${studentData['الاسم']}</h2>
                    <p class="text-orange-600 font-bold mt-1">نتيجة الصف ${gNames[studentData.grade] || ''}</p>
                    <div class="flex justify-center gap-4 mt-2 text-xs font-bold text-gray-400">
                        <span>رقم الجلوس: ${studentData.seatID}</span>
                        <span>رقم الاستعلام: ${studentData.secretID}</span>
                    </div>
                </div>
                
                <div class="space-y-3">
            `;
            
            // ترتيب وعرض الدرجات (تجاهل البيانات التقنية)
            for (let key in studentData) {
                if(!['secretID', 'seatID', 'grade', 'timestamp', 'الاسم'].includes(key)) {
                    tableHTML += `
                        <div class="flex justify-between items-center p-4 bg-blue-50/50 rounded-2xl border-b border-blue-100">
                            <span class="font-bold text-gray-600">${key}</span>
                            <span class="font-black text-blue-900 text-lg">${studentData[key]}</span>
                        </div>
                    `;
                }
            }

            tableHTML += `
                </div>
                <div class="mt-8 flex flex-col gap-3 no-print">
                    <button onclick="window.print()" class="w-full bg-blue-900 text-white p-4 rounded-2xl font-black flex items-center justify-center gap-2">
                        <i class="fas fa-print"></i> طباعة الشهادة
                    </button>
                    <button onclick="location.reload()" class="w-full bg-gray-100 text-gray-500 p-3 rounded-2xl font-bold text-sm">
                        بحث عن نتيجة أخرى
                    </button>
                </div>
                <p class="text-center text-[9px] text-gray-300 mt-6 uppercase tracking-widest italic">Official Result Portal - Al Malek El Kamel High School</p>
            `;
            
            content.innerHTML = tableHTML;
            display.scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
