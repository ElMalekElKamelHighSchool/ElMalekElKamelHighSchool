<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نتيجة الطالب | منصة المستشار</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Cairo', sans-serif; }</style>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-4xl mx-auto bg-white rounded-3xl shadow-2xl overflow-hidden">
        <!-- Header النتيجة -->
        <div class="bg-blue-900 p-8 text-white text-center">
            <h1 class="text-3xl font-black mb-2">نتيجة امتحانات الفصل الدراسي</h1>
            <p class="text-yellow-400">مدرسة الملك الكامل الثانوية العسكرية</p>
        </div>

        <div class="p-8">
            <div id="resultContent" class="hidden">
                <!-- بيانات الطالب -->
                <div class="flex justify-between items-center border-b pb-4 mb-6">
                    <div>
                        <p class="text-gray-500">اسم الطالب</p>
                        <h2 id="stName" class="text-xl font-bold text-blue-900">...</h2>
                    </div>
                    <div class="text-left">
                        <p class="text-gray-500">المجموع الكلي</p>
                        <h2 id="totalGrade" class="text-3xl font-black text-green-600">...</h2>
                    </div>
                </div>

                <!-- جدول الدرجات بالأرقام الهندية -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="space-y-4" id="subjectsGrades">
                        <!-- الدرجات تظهر هنا برمجياً -->
                    </div>
                    
                    <!-- الرسم البياني -->
                    <div class="bg-gray-50 p-4 rounded-xl">
                        <canvas id="myChart"></canvas>
                    </div>
                </div>
            </div>

            <!-- فورم الاستعلام -->
            <div id="searchBox" class="text-center py-10">
                <input type="text" id="seatInput" placeholder="أدخل رقم الجلوس" class="border-2 border-blue-900 p-3 rounded-lg w-64 text-center text-xl mb-4">
                <br>
                <button id="searchBtn" class="bg-blue-900 text-white px-10 py-3 rounded-full font-bold shadow-lg hover:scale-105 transition">استعلام عن النتيجة</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { db, doc, getDoc, toArabicNum } from './config.js';
        
        document.getElementById('searchBtn').onclick = async () => {
            const seat = document.getElementById('seatInput').value;
            const docSnap = await getDoc(doc(db, "results", seat));

            if (docSnap.exists()) {
                const data = docSnap.data();
                document.getElementById('searchBox').classList.add('hidden');
                document.getElementById('resultContent').classList.remove('hidden');
                
                // عرض الدرجات بالأرقام التي طلبتها (١، ٢، ٣)
                document.getElementById('totalGrade').innerText = toArabicNum(data.math + data.physics + data.chemistry);
                
                // منطق عرض المواد...
                renderSubjects(data);
            } else {
                alert("رقم الجلوس غير موجود!");
            }
        };

        function renderSubjects(data) {
            const container = document.getElementById('subjectsGrades');
            const subjects = [
                { name: 'الرياضيات', score: data.math },
                { name: 'الفيزياء', score: data.physics },
                { name: 'الكيمياء', score: data.chemistry }
            ];

            subjects.forEach(sub => {
                container.innerHTML += `
                    <div class="flex justify-between items-center bg-gray-50 p-3 rounded-lg">
                        <span class="font-bold">${sub.name}</span>
                        <span class="text-blue-900 font-black">${toArabicNum(sub.score)} / ١٠٠</span>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
