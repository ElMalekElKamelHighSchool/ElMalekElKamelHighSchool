<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مدرسة الملك الكامل الثانوية العسكرية بنين</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Cairo', sans-serif; }</style>
</head>
<body class="bg-gray-50">
    <!-- Navbar -->
    <nav class="bg-blue-900 text-white sticky top-0 z-50 shadow-2xl p-4">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <img src="https://via.placeholder.com/50" class="rounded-full border-2 border-yellow-500">
                <div>
                    <h1 class="text-xl font-bold">الملك الكامل الثانوية العسكرية</h1>
                    <p class="text-xs text-yellow-400">إدارة شرق المنصورة التعليمية</p>
                </div>
            </div>
            <div class="hidden md:flex gap-6 font-semibold">
                <a href="#about" class="hover:text-yellow-400">عن المدرسة</a>
                <a href="#achievements" class="hover:text-yellow-400">الإنجازات</a>
                <a href="login.html" class="bg-yellow-500 text-blue-900 px-6 py-2 rounded-full hover:bg-white transition">دخول المنصة</a>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <header class="h-[70vh] bg-cover bg-center flex items-center justify-center text-white relative" style="background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://via.placeholder.com/1200x600');">
        <div class="text-center animate-bounce">
            <h2 class="text-5xl font-black mb-6">صناعة الرجال.. وقادة المستقبل</h2>
            <p class="text-2xl opacity-90">مرحباً بكم في الصرح التعليمي الأول بمحافظة الدقهلية</p>
        </div>
    </header>

    <!-- About Section (بيانات ديناميكية من الأدمن) -->
    <section id="about" class="py-20 container mx-auto px-6">
        <div class="grid md:grid-cols-2 gap-12 items-center">
            <div id="school-info">
                <h3 class="text-3xl font-bold text-blue-900 mb-6">كلمة إدارة المدرسة</h3>
                <p class="text-gray-700 leading-relaxed text-lg" id="aboutText">جاري تحميل التعريف بالمدرسة...</p>
            </div>
            <div class="bg-blue-900 h-64 rounded-2xl shadow-2xl flex items-center justify-center text-white">
                <span class="text-xl">فيديو تعريفي للمدرسة</span>
            </div>
        </div>
    </section>

    <script type="module">
        import { db, doc, getDoc } from './config.js';
        // جلب بيانات التعريف التي وضعها الأدمن
        const info = await getDoc(doc(db, "settings", "school_info"));
        if(info.exists()) document.getElementById('aboutText').innerText = info.data().text;
    </script>
</body>
</html>
