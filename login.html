<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>دخول المنصة | مدرسة الملك الكامل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-blue-900 to-black min-h-screen flex items-center justify-center font-['Cairo'] p-4">
    <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-md">
        <h2 class="text-2xl font-black text-center text-blue-900 mb-6">تسجيل دخول المنصة</h2>
        <form id="loginForm" class="space-y-4">
            <input type="email" id="email" placeholder="البريد الإلكتروني" class="w-full p-3 border-2 rounded-xl outline-none focus:border-blue-900" required>
            <input type="password" id="pass" placeholder="كلمة المرور" class="w-full p-3 border-2 rounded-xl outline-none focus:border-blue-900" required>
            <button type="submit" class="w-full bg-blue-900 text-white font-bold py-3 rounded-xl hover:bg-blue-800 transition">دخول</button>
        </form>
        <p class="text-center mt-4 text-sm text-gray-600">ليس لديك حساب؟ <a href="signup.html" class="text-blue-900 font-bold underline">سجل الآن</a></p>
    </div>

    <script type="module">
        import { auth, db } from './config.js';
        import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, pass);
                const user = userCredential.user;

                if (email.endsWith('@admin.com')) {
                    window.location.href = 'admin-dashboard.html';
                } else {
                    const userDoc = await getDoc(doc(db, "users", user.uid));
                    if (userDoc.exists()) {
                        window.location.href = 'dashboard.html';
                    }
                }
            } catch (error) { alert("خطأ في البيانات أو الحساب غير موجود"); }
        };
    </script>
</body>
</html>
