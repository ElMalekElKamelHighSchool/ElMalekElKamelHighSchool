<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>دخول المنصة | مدرسة الملك الكامل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Cairo', sans-serif; }</style>
</head>
<body class="bg-gradient-to-br from-blue-900 via-blue-800 to-black min-h-screen flex items-center justify-center p-4">

    <div class="bg-white/95 backdrop-blur w-full max-w-md p-8 rounded-3xl shadow-2xl border border-white/20">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black text-blue-900 mb-2">منصة المستشار</h1>
            <p class="text-gray-600 font-bold">تسجيل الدخول المباشر</p>
        </div>

        <form id="loginForm" class="space-y-5">
            <input type="email" id="email" class="w-full p-3 rounded-xl border-2 border-gray-200 focus:border-blue-900 outline-none transition" placeholder="البريد الإلكتروني" required>
            <input type="password" id="pass" class="w-full p-3 rounded-xl border-2 border-gray-200 focus:border-blue-900 outline-none transition" placeholder="كلمة المرور" required>
            
            <button type="submit" class="w-full bg-blue-900 text-white font-bold py-4 rounded-xl hover:bg-blue-800 transition shadow-lg">
                دخول للمنصة الآن
            </button>
        </form>

        <div class="mt-8 text-center border-t pt-6">
            <a href="signup.html" class="inline-block bg-yellow-500 text-blue-900 font-black px-8 py-2 rounded-full hover:bg-yellow-400 transition shadow-md">
                إنشاء حساب جديد
            </a>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './config.js';
        import { signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

        // فحص الدخول التلقائي
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists()) {
                    redirectUser(userDoc.data().role);
                }
            }
        });

        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, pass);
                const user = userCredential.user;

                // جلب البيانات من Firestore والدخول فوراً بدون تفعيل إيميل
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists()) {
                    redirectUser(userDoc.data().role);
                } else {
                    alert("⚠️ الحساب موجود ولكن لا توجد بيانات مسجلة في Firestore.");
                }
            } catch (error) {
                alert("❌ فشل الدخول: تأكد من الإيميل وكلمة المرور.");
            }
        };

        function redirectUser(role) {
            if (role === 'admin') window.location.href = 'admin-dashboard.html';
            else if (role === 'teacher') window.location.href = 'teacher-portal.html';
            else window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
