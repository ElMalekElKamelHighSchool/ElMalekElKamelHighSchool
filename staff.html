<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>الكادر التعليمي | الملك الكامل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Cairo', sans-serif; background-color: #f8fafc; }</style>
</head>
<body>
    <div class="bg-blue-950 text-white py-20 text-center">
        <h1 class="text-6xl font-black mb-4">قيادة مدرسة الملك الكامل</h1>
        <p class="text-yellow-500 font-bold tracking-widest uppercase">نخبة المعلمين والقيادات التربوية</p>
    </div>

    <div class="container mx-auto px-6 py-24">
        <div class="max-w-4xl mx-auto bg-white rounded-[3rem] shadow-2xl overflow-hidden mb-24 border-r-[20px] border-blue-900 flex flex-col md:flex-row">
            <img src="https://i.ibb.co/VYBqDDR/1778149653479.jpg" class="w-full md:w-80 h-96 object-cover grayscale hover:grayscale-0 transition duration-700">
            <div class="p-12">
                <span class="text-red-700 font-black">القائد التربوي</span>
                <h2 class="text-4xl font-black text-blue-950 mt-2 mb-6">الأستاذ / مدير المدرسة</h2>
                <p class="text-gray-500 font-bold italic text-lg leading-relaxed">"إن مدرستنا العسكرية هي صانعة الرجال، ونحن هنا لنقدم لأبنائنا أفضل تعليم يجمع بين الانضباط العسكري والتفوق العلمي الحديث."</p>
                <div class="mt-8 flex gap-4">
                    <div class="h-2 w-20 bg-blue-900"></div>
                    <div class="h-2 w-10 bg-yellow-500"></div>
                </div>
            </div>
        </div>

        <h3 class="text-center text-4xl font-black text-blue-900 mb-16">أعضاء هيئة التدريس</h3>
        <div class="grid lg:grid-cols-4 md:grid-cols-2 gap-8">
            <div class="bg-white p-8 rounded-2xl shadow-lg text-center">
                <div class="w-24 h-24 bg-gray-100 rounded-full mx-auto mb-4 border-4 border-blue-900"></div>
                <h4 class="font-black text-xl">معلم المادة</h4>
                <p class="text-gray-400 font-bold text-sm">تخصص اللغة العربية</p>
            </div>
        </div>
    </div>
</body>
</html>
