<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>بوابة النتائج | الملك الكامل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Cairo', sans-serif; background: #0f172a; }</style>
</head>
<body class="min-h-screen flex items-center justify-center p-8 bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')]">

    <div class="max-w-4xl w-full text-center">
        <div class="bg-slate-900 p-20 rounded-[4rem] border border-white/10 shadow-[0_0_100px_rgba(30,58,138,0.3)] relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-blue-600 via-yellow-500 to-red-600"></div>
            
            <h1 class="text-6xl font-black text-white mb-6">منصة النتائج <span class="text-blue-500">الرقمية</span></h1>
            <p class="text-yellow-500 font-bold tracking-[0.5em] mb-16 uppercase">بوابة حلم الأجيال</p>

            <div class="space-y-10">
                <div class="p-12 border border-dashed border-white/10 rounded-[3rem] bg-white/5 group hover:bg-white/10 transition">
                    <img src="https://cdn-icons-png.flaticon.com/512/1458/1458260.png" class="w-24 mx-auto mb-8 animate-pulse">
                    <h2 class="text-4xl font-bold text-gray-300">ترقبوا النتائج قريباً</h2>
                    <p class="text-gray-500 mt-6 text-xl leading-relaxed">تجري الآن عمليات التصحيح والرصد الدقيق لضمان حقوق كافة الطلاب. سيتم تفعيل البحث برقم الجلوس فور اعتماد النتيجة من مدير المدرسة.</p>
                </div>
                
                <div class="flex flex-col md:flex-row gap-4 justify-center">
                    <a href="index.html" class="px-12 py-5 bg-white text-blue-900 rounded-2xl font-black text-xl hover:scale-105 transition shadow-2xl">العودة للرئيسية</a>
                    <button class="px-12 py-5 bg-blue-600 text-white rounded-2xl font-black text-xl opacity-50 cursor-not-allowed">تنبيهي عند الصدور</button>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
