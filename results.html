<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نتائج الطلاب | الملك الكامل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Cairo', sans-serif; }</style>
</head>
<body class="bg-blue-900 min-h-screen flex items-center justify-center p-6">

    <div class="bg-white p-10 rounded-3xl shadow-2xl w-full max-w-md text-center">
        <h2 class="text-3xl font-black text-blue-900 mb-6">استعلام النتائج</h2>
        
        <div id="statusArea">
            <div class="bg-yellow-50 p-6 rounded-xl border border-yellow-200 mb-6">
                <p class="text-yellow-700 font-bold">عذراً، لم تظهر نتائج الامتحانات حتى الآن.</p>
                <h3 class="text-2xl font-black text-blue-900 mt-2">انتظرونا قريباً</h3>
            </div>
            <a href="index.html" class="text-blue-600 font-bold underline">العودة للرئيسية</a>
        </div>
    </div>

    <script>
        // دالة لفحص هل الأدمن رفع ملف نتائج أم لا (مثال برمجي)
        window.onload = () => {
            const hasResults = localStorage.getItem('schoolResults');
            if(hasResults) {
                document.getElementById('statusArea').innerHTML = `
                    <input type="text" placeholder="رقم الجلوس" class="w-full border-2 p-3 rounded-lg mb-4 text-center">
                    <button class="bg-blue-900 text-white w-full py-3 rounded-lg font-bold">بحث عن النتيجة</button>
                `;
            }
        }
    </script>
</body>
</html>
