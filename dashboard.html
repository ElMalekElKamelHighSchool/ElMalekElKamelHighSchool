<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة الطالب | الملك الكامل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-100 font-['Cairo']">
    <nav class="bg-blue-900 text-white p-4 flex justify-between items-center shadow-lg">
        <h1 class="font-black text-xl">لوحة الطالب</h1>
        <button id="logoutBtn" class="bg-red-500 px-4 py-1 rounded-lg text-sm">خروج</button>
    </nav>
    <div class="p-8">
        <h2 class="text-2xl font-bold">أهلاً، <span id="userName">...</span></h2>
        <div class="mt-8 grid grid-cols-1 md:grid-cols-2 gap-4">
            <a href="student-result.html" class="bg-white p-6 rounded-2xl shadow border-r-4 border-yellow-500">نتائج الاختبارات</a>
            <div class="bg-white p-6 rounded-2xl shadow border-r-4 border-blue-500 italic text-gray-400 text-center">لا توجد محاضرات حالياً</div>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './config.js';
        import { signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists()) document.getElementById('userName').innerText = userDoc.data().fullName;
            } else { window.location.href = 'index.html'; }
        });

        document.getElementById('logoutBtn').onclick = () => {
            signOut(auth).then(() => { window.location.href = 'index.html'; });
        };
    </script>
</body>
</html>
