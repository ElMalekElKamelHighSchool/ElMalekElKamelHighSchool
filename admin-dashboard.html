<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة الإدارة | المستشار</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-900 text-white font-['Cairo']">
    <nav class="bg-black p-4 flex justify-between border-b border-yellow-500">
        <h1 class="text-xl font-black text-yellow-500 italic">لوحة تحكم المستشار (ADMIN)</h1>
        <button id="logoutBtn" class="bg-red-600 px-4 py-1 rounded-lg">تسجيل الخروج</button>
    </nav>
    <div class="p-8 grid grid-cols-1 md:grid-cols-3 gap-6">
        <a href="admin-results.html" class="bg-blue-800 p-10 rounded-3xl text-center hover:scale-105 transition shadow-2xl">رفع النتائج</a>
        <a href="teacher-portal.html" class="bg-green-800 p-10 rounded-3xl text-center hover:scale-105 transition shadow-2xl">إدارة المدرسين</a>
        <div class="bg-gray-800 p-10 rounded-3xl text-center opacity-50">إعدادات المنصة</div>
    </div>

    <script type="module">
        import { auth } from './config.js';
        import { signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";

        onAuthStateChanged(auth, (user) => {
            if (!user || !user.email.endsWith('@admin.com')) { window.location.href = 'login.html'; }
        });

        document.getElementById('logoutBtn').onclick = () => {
            signOut(auth).then(() => { window.location.href = 'index.html'; });
        };
    </script>
</body>
</html>
